name: CI — Backend Solidity

on:
  workflow_call:

jobs:
  backend-solidity:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      # Same as ci-backend.yml: lib/ is gitignored; populate before forge build / coverage.
      - name: Install Foundry libraries (OpenZeppelin, forge-std)
        run: |
          cd backend
          forge install OpenZeppelin/openzeppelin-contracts@v5.0.2 foundry-rs/forge-std@v1.9.7 --no-git

      # Slither + ignore-compile: crytic-compile needs full build-info JSON (with "output"); add --build-info.
      # Build only src contracts (path `contracts`), not test/script — keeps Slither scope to production .sol.
      - name: Forge build
        run: |
          cd backend
          forge --version
          forge build --build-info --sizes contracts

      # ERC-7730: descriptor selectors vs ABI + Ledger-style calldata test vectors (see contracts/erc7730/).
      - name: Set up Bun and install (ERC-7730 checks)
        uses: ./.github/actions/setup

      - name: ERC-7730 — descriptor sync + calldata tests
        run: |
          cd backend
          bun run erc7730:check

      - name: Slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: "backend/contracts"
          solc-version: "0.8.28"
          slither-config: "./backend/slither.config.json"
          ignore-compile: true

      - name: Forge coverage
        run: |
          cd backend
          forge coverage -vvv --report lcov

      - name: Code coverage at 100% (Foundry)
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: "./backend/lcov.info"
          min_coverage: 100
          # SF: paths are relative to backend/. very_good_coverage splits `exclude` on spaces (not commas).
          # Mocks are exercised only as test doubles; production contracts are Ballot + InvoiceRegistry (Foundry tests).
          exclude: "lib/** contracts/mocks/**"

      - name: Hardhat tests with coverage
        run: |
          cd backend
          bun run test:hardhat:coverage

      - name: Code coverage at 100% (Hardhat)
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: "./backend/coverage/lcov.info"
          min_coverage: 100
          # Same as ci-backend.yml: OpenZeppelin under lib/ is not part of our coverage target.
          exclude: "lib/**"
